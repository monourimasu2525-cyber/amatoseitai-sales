<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あまと整体院 売上管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f9fafb; }
  .quick-card { transition: transform 0.1s, box-shadow 0.1s; cursor: pointer; }
  .quick-card:active { transform: scale(0.97); }
  .period-btn { transition: all 0.15s; cursor: pointer; }
  .bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ヘッダー -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-10">
  <div class="flex items-center justify-between px-4 h-12">
    <span class="font-bold text-gray-900 text-base">あまと整体院</span>
    <span class="text-sm text-gray-500">4月17日 金</span>
  </div>
</header>

<!-- 指標バー（横スクロール） -->
<div class="bg-white border-b border-gray-100 px-4 py-3">
  <div class="flex gap-3 overflow-x-auto scrollbar-hide">
    <div class="border border-gray-200 rounded-lg px-3 py-2 min-w-[120px] bg-gray-50 flex-shrink-0">
      <div class="text-xs text-gray-500 mb-1">今月売上</div>
      <div class="font-bold text-gray-900 text-base">¥174,240</div>
      <div class="text-xs text-green-600 mt-0.5">▲10.3% 先月比</div>
    </div>
    <div class="border border-gray-200 rounded-lg px-3 py-2 min-w-[120px] bg-gray-50 flex-shrink-0">
      <div class="text-xs text-gray-500 mb-1">今日の売上</div>
      <div class="font-bold text-gray-900 text-base">¥8,770</div>
      <div class="text-xs text-gray-500 mt-0.5">3件</div>
    </div>
    <div class="border border-gray-200 rounded-lg px-3 py-2 min-w-[120px] bg-gray-50 flex-shrink-0">
      <div class="text-xs text-gray-500 mb-1">新規</div>
      <div class="font-bold text-green-600 text-base">¥89,370</div>
      <div class="text-xs text-gray-500 mt-0.5">24件</div>
    </div>
    <div class="border border-gray-200 rounded-lg px-3 py-2 min-w-[120px] bg-gray-50 flex-shrink-0">
      <div class="text-xs text-gray-500 mb-1">常連</div>
      <div class="font-bold text-blue-600 text-base">¥84,870</div>
      <div class="text-xs text-gray-500 mt-0.5">18件</div>
    </div>
  </div>
</div>

<!-- グラフカード -->
<div class="mx-4 mt-3 bg-white rounded-xl border border-gray-200 shadow-sm p-4">
  <div class="flex items-center justify-between mb-3">
    <span class="text-sm font-bold text-gray-700">売上推移</span>
    <div class="flex gap-1" id="periodBtns">
      <button onclick="setPeriod(7)" class="period-btn px-3 py-1 rounded-lg text-xs bg-indigo-600 text-white" data-period="7">7日</button>
      <button onclick="setPeriod(15)" class="period-btn px-3 py-1 rounded-lg text-xs bg-gray-100 text-gray-600" data-period="15">15日</button>
      <button onclick="setPeriod(30)" class="period-btn px-3 py-1 rounded-lg text-xs bg-gray-100 text-gray-600" data-period="30">30日</button>
    </div>
  </div>
  <div style="height:160px">
    <canvas id="salesChart"></canvas>
  </div>
</div>

<!-- クイック入力 -->
<div class="mx-4 mt-3">
  <div class="text-xs text-gray-500 mb-2">記録する</div>
  <div class="grid grid-cols-2 gap-3">
    <div class="quick-card bg-green-50 border border-green-200 rounded-xl p-4 text-center" onclick="showToast('新規 ¥3,270 を登録しました ✅')">
      <div class="text-sm font-bold text-green-700 mb-1">🆕 新規</div>
      <div class="text-lg font-bold text-green-600">¥3,270</div>
    </div>
    <div class="quick-card bg-blue-50 border border-blue-200 rounded-xl p-4 text-center" onclick="showToast('常連 ¥5,500 を登録しました ✅')">
      <div class="text-sm font-bold text-blue-700 mb-1">👥 常連</div>
      <div class="text-lg font-bold text-blue-600">¥5,500</div>
    </div>
  </div>
</div>

<!-- 今日の記録 -->
<div class="mx-4 mt-3 mb-24 bg-white rounded-xl border border-gray-200 shadow-sm p-4">
  <div class="flex items-center justify-between mb-3">
    <span class="text-sm font-bold text-gray-700">今日の記録</span>
    <span class="text-xs bg-indigo-100 text-indigo-700 rounded-full px-2 py-0.5">3件</span>
  </div>
  <div class="divide-y divide-gray-100">
    <div class="flex items-center justify-between py-2.5">
      <div class="flex items-center gap-2">
        <span class="text-xs bg-green-100 text-green-700 rounded px-2 py-0.5 font-medium">新規</span>
        <span class="font-bold text-sm text-gray-900">¥3,270</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">09:15</span>
        <button class="text-xs text-red-400 hover:text-red-600">取消</button>
      </div>
    </div>
    <div class="flex items-center justify-between py-2.5">
      <div class="flex items-center gap-2">
        <span class="text-xs bg-blue-100 text-blue-700 rounded px-2 py-0.5 font-medium">常連</span>
        <span class="font-bold text-sm text-gray-900">¥5,500</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">11:30</span>
        <button class="text-xs text-red-400 hover:text-red-600">取消</button>
      </div>
    </div>
    <div class="flex items-center justify-between py-2.5">
      <div class="flex items-center gap-2">
        <span class="text-xs bg-green-100 text-green-700 rounded px-2 py-0.5 font-medium">新規</span>
        <span class="font-bold text-sm text-gray-900">¥3,270</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">14:00</span>
        <button class="text-xs text-red-400 hover:text-red-600">取消</button>
      </div>
    </div>
  </div>
  <div class="text-right mt-2">
    <span class="text-xs text-indigo-600 cursor-pointer">すべて見る →</span>
  </div>
</div>

<!-- ボトムナビ -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 bottom-nav z-10">
  <div class="flex items-center justify-around h-14">
    <button class="flex flex-col items-center gap-0.5 px-4">
      <span class="text-lg">🏠</span>
      <span class="text-xs text-indigo-600 font-medium">ホーム</span>
    </button>
    <button class="flex flex-col items-center gap-0.5 px-4">
      <span class="text-lg">➕</span>
      <span class="text-xs text-gray-400">入力</span>
    </button>
    <button class="flex flex-col items-center gap-0.5 px-4">
      <span class="text-lg">📊</span>
      <span class="text-xs text-gray-400">集計</span>
    </button>
    <button class="flex flex-col items-center gap-0.5 px-4">
      <span class="text-lg">⚙️</span>
      <span class="text-xs text-gray-400">設定</span>
    </button>
  </div>
</nav>

<!-- トースト -->
<div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm px-4 py-2 rounded-full opacity-0 transition-opacity duration-300 z-50 whitespace-nowrap pointer-events-none"></div>

<script>
// ダミーデータ生成（30日分）
const today = new Date();
const allData = [];
const allLabels = [];
for (let i = 29; i >= 0; i--) {
  const d = new Date(today);
  d.setDate(d.getDate() - i);
  const dow = d.getDay();
  const base = dow === 0 ? 3000 : 12000;
  const val = Math.floor(Math.random() * base + (dow === 0 ? 0 : 5000));
  allData.push(val);
  allLabels.push((d.getMonth()+1) + '/' + d.getDate());
}

let currentPeriod = 7;
let chart;

function initChart() {
  const ctx = document.getElementById('salesChart').getContext('2d');
  const sliced = allData.slice(-currentPeriod);
  const labels = allLabels.slice(-currentPeriod);
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: sliced,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.08)',
        fill: true,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: '#6366f1',
        borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => '¥' + Math.round(ctx.raw).toLocaleString()
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10 }, color: '#9ca3af', maxTicksLimit: 7 }
        },
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { size: 10 },
            color: '#9ca3af',
            callback: v => (v / 10000).toFixed(1) + '万'
          }
        }
      }
    }
  });
}

function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(btn => {
    if (parseInt(btn.dataset.period) === period) {
      btn.className = 'period-btn px-3 py-1 rounded-lg text-xs bg-indigo-600 text-white';
    } else {
      btn.className = 'period-btn px-3 py-1 rounded-lg text-xs bg-gray-100 text-gray-600';
    }
  });
  chart.data.labels = allLabels.slice(-period);
  chart.data.datasets[0].data = allData.slice(-period);
  chart.update();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2000);
}

initChart();
</script>
</body>
</html>
