<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あまと整体院 売上管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif; background: #f9fafb; }
  .page { display: none; }
  .page.active { display: block; }
  .toast { transform: translateY(20px); opacity: 0; transition: all 0.25s ease; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .modal { display: none; }
  .modal.open { display: flex; }
  .spinner { border: 2px solid #e0e7ff; border-top: 2px solid #4f46e5; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .quick-card { transition: transform 0.1s, box-shadow 0.1s; cursor: pointer; }
  .quick-card:active { transform: scale(0.97); box-shadow: none; }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  .period-btn { transition: all 0.15s; cursor: pointer; }
  .bottom-nav-safe { padding-bottom: env(safe-area-inset-bottom); }
</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ヘッダー -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-30">
  <div class="flex items-center justify-between px-4 h-12 max-w-lg mx-auto">
    <div class="flex items-center gap-2">
      <span class="text-lg">🏥</span>
      <span class="font-bold text-gray-900 text-base">あまと整体院</span>
    </div>
    <div id="headerDate" class="text-sm text-gray-400"></div>
  </div>
</header>

<!-- ========== ホームページ ========== -->
<div id="page-home" class="page active pb-24">
  <!-- 指標バー -->
  <div class="bg-white border-b border-gray-100 px-4 py-3">
    <div class="flex gap-3 overflow-x-auto scrollbar-hide max-w-lg mx-auto">
      <div class="border border-gray-200 rounded-xl px-3 py-2.5 min-w-[130px] bg-gray-50 flex-shrink-0">
        <div class="text-xs text-gray-400 mb-1">今月売上</div>
        <div id="kpi_month" class="font-bold text-gray-900 text-sm">—</div>
        <div id="kpi_month_diff" class="text-xs text-gray-400 mt-0.5">—</div>
      </div>
      <div class="border border-gray-200 rounded-xl px-3 py-2.5 min-w-[130px] bg-gray-50 flex-shrink-0">
        <div class="text-xs text-gray-400 mb-1">今日の売上</div>
        <div id="kpi_today" class="font-bold text-gray-900 text-sm">—</div>
        <div id="kpi_today_count" class="text-xs text-gray-400 mt-0.5">—</div>
      </div>
      <div class="border border-gray-200 rounded-xl px-3 py-2.5 min-w-[110px] bg-gray-50 flex-shrink-0">
        <div class="text-xs text-gray-400 mb-1">新規</div>
        <div id="kpi_shinki" class="font-bold text-green-600 text-sm">—</div>
        <div id="kpi_shinki_count" class="text-xs text-gray-400 mt-0.5">—</div>
      </div>
      <div class="border border-gray-200 rounded-xl px-3 py-2.5 min-w-[110px] bg-gray-50 flex-shrink-0">
        <div class="text-xs text-gray-400 mb-1">常連</div>
        <div id="kpi_joren" class="font-bold text-blue-600 text-sm">—</div>
        <div id="kpi_joren_count" class="text-xs text-gray-400 mt-0.5">—</div>
      </div>
    </div>
  </div>

  <div class="max-w-lg mx-auto px-4 mt-3 space-y-3">
    <!-- 売上推移グラフ -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-bold text-gray-700">売上推移</span>
        <div class="flex gap-1">
          <button onclick="setPeriod(7)" class="period-btn px-3 py-1 rounded-lg text-xs bg-indigo-600 text-white" data-p="7">7日</button>
          <button onclick="setPeriod(15)" class="period-btn px-3 py-1 rounded-lg text-xs bg-gray-100 text-gray-500" data-p="15">15日</button>
          <button onclick="setPeriod(30)" class="period-btn px-3 py-1 rounded-lg text-xs bg-gray-100 text-gray-500" data-p="30">30日</button>
        </div>
      </div>
      <div id="trendSpinner" class="flex justify-center py-6"><div class="spinner w-6 h-6"></div></div>
      <div style="height:160px; display:none" id="trendChartWrap">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <!-- クイック入力 -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="text-xs text-gray-400 mb-2">記録する</div>
      <div id="quickBtns" class="grid grid-cols-2 gap-3">
        <div class="col-span-2 flex justify-center py-3"><div class="spinner w-5 h-5"></div></div>
      </div>
    </div>

    <!-- 今日の記録 -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-bold text-gray-700">今日の記録</span>
        <span id="todayCountBadge" class="text-xs bg-indigo-100 text-indigo-700 rounded-full px-2 py-0.5">—</span>
      </div>
      <div id="todayHistoryList" class="divide-y divide-gray-50 text-sm text-gray-400">読込中…</div>
      <div class="text-right mt-2">
        <button onclick="switchPage('input')" class="text-xs text-indigo-500">すべて見る →</button>
      </div>
    </div>
  </div>
</div>

<!-- ========== 入力ページ ========== -->
<div id="page-input" class="page pb-24">
  <div class="max-w-lg mx-auto px-4 pt-3 space-y-3">
    <!-- フォーム -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="text-sm font-bold text-gray-700 mb-3">売上入力</div>
      <div class="mb-3">
        <label class="block text-xs text-gray-400 mb-1">種別</label>
        <select id="inputType" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100"></select>
      </div>
      <div class="mb-4">
        <label class="block text-xs text-gray-400 mb-1">金額（円）</label>
        <input id="inputAmount" type="number" inputmode="numeric" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" placeholder="3270">
      </div>
      <button id="addSaleBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded-xl py-3 font-semibold text-sm transition-colors shadow-sm flex items-center justify-center gap-2">
        <span>登録する</span>
        <div id="addSaleSpinner" class="spinner hidden w-4 h-4" style="border-color:rgba(255,255,255,0.4);border-top-color:white;"></div>
      </button>
    </div>

    <!-- 履歴 -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-bold text-gray-700">直近30日の履歴</span>
        <div id="historySpinner" class="spinner hidden w-4 h-4"></div>
      </div>
      <div id="historyList" class="divide-y divide-gray-50 text-sm text-gray-400">読込中…</div>
    </div>
  </div>
</div>

<!-- ========== 集計ページ ========== -->
<div id="page-stats" class="page pb-24">
  <div class="max-w-lg mx-auto px-4 pt-3 space-y-3">
    <!-- 月選択 -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="flex items-center gap-2">
        <select id="statsYear" class="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400"></select>
        <select id="statsMonth" class="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400"></select>
        <button id="loadStatsBtn" class="ml-auto bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition-colors">表示</button>
      </div>
    </div>

    <!-- サマリーカード -->
    <div class="grid grid-cols-3 gap-2">
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-3 text-center">

        <div id="statsShinkiSales" class="text-sm font-bold text-indigo-600">—</div>
        <div id="statsShinkiCount" class="text-xs text-gray-400">—件</div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-3 text-center">
        <div class="text-xs text-gray-400 mb-1">常連</div>
        <div id="statsJorenSales" class="text-sm font-bold text-green-600">—</div>
        <div id="statsJorenCount" class="text-xs text-gray-400">—件</div>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-3 text-center">
        <div class="text-xs text-gray-400 mb-1">合計</div>
        <div id="statsTotalSales" class="text-sm font-bold text-gray-800">—</div>
        <div id="statsTotalCount" class="text-xs text-gray-400">—件</div>
      </div>
    </div>

    <!-- グラフ（切替） -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="flex items-center gap-2 mb-3">
        <button onclick="switchStatsChart('month')" id="statsTabMonth" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-indigo-600 text-white">月内訳</button>
        <button onclick="switchStatsChart('trend')" id="statsTabTrend" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-gray-100 text-gray-500">12ヶ月</button>
      </div>
      <div id="statsChartSpinner" class="flex justify-center py-6"><div class="spinner w-6 h-6"></div></div>
      <div id="monthChartWrap" style="height:200px; display:none"><canvas id="monthChart"></canvas></div>
      <div id="trendChartWrap12" style="height:200px; display:none"><canvas id="trendChart12"></canvas></div>
    </div>

    <!-- テーブル -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="text-sm font-bold text-gray-700 mb-3">月次サマリー</div>
      <div id="statsTable" class="text-sm text-gray-400 text-center py-4">月を選択して「表示」を押してください</div>
    </div>
  </div>
</div>

<!-- ========== 設定ページ ========== -->
<div id="page-settings" class="page pb-24">
  <div class="max-w-lg mx-auto px-4 pt-3 space-y-3">

    <!-- 売上マスタ -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm">
      <div class="px-4 pt-4 pb-2">
        <div class="flex items-center justify-between">
          <span class="text-sm font-bold text-gray-700">売上マスタ</span>
          <div id="masterSpinner" class="spinner hidden w-4 h-4"></div>
        </div>
        <div class="text-xs text-gray-400 mt-0.5">クイック入力・種別選択に反映されます</div>
      </div>
      <div id="masterList" class="divide-y divide-gray-100 px-4 pb-3 text-sm text-gray-400">読込中…</div>
      <div class="px-4 pb-4 pt-3 border-t border-gray-100">

        <div class="grid grid-cols-2 gap-2 mb-2">

          <input id="newMasterAmount" type="number" placeholder="金額" class="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400">
        </div>
        <input id="newMasterDesc" type="text" placeholder="説明（任意）" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400 mb-2">
        <button id="addMasterBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl py-2.5 text-sm font-medium transition-colors">追加する</button>

    </div>

    <!-- 経理シート -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="text-sm font-bold text-gray-700 mb-3">経理シート生成</div>
      <div class="flex gap-2 mb-3">
        <select id="accYear" class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400"></select>
        <select id="accMonth" class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400"></select>
      </div>
      <button id="genAccBtn" class="w-full bg-gray-800 hover:bg-gray-900 text-white rounded-xl py-2.5 text-sm font-medium transition-colors flex items-center justify-center gap-2">
        <span id="genAccBtnText">経理シートを生成する</span>
        <div id="genAccSpinner" class="spinner hidden w-4 h-4" style="border-color:rgba(255,255,255,0.4);border-top-color:white;"></div>
      </button>
      <div id="accResult" class="hidden mt-3">
        <div class="bg-green-50 rounded-xl p-3 border border-green-100 mb-2 text-xs text-green-700">
          <span id="accResultMsg"></span>
        </div>
        <a id="accSheetLink" href="#" target="_blank" class="block text-center text-xs text-indigo-600 border border-indigo-200 rounded-xl py-2.5 hover:bg-indigo-50 transition-colors">スプレッドシートを開く →</a>
      </div>
    </div>

    <!-- バックアップ -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
      <div class="text-sm font-bold text-gray-700 mb-3">バックアップ</div>
      <button id="backupBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl py-2.5 text-sm font-medium transition-colors flex items-center justify-center gap-2">
        <span id="backupBtnText">今すぐバックアップ</span>
        <div id="backupSpinner" class="spinner hidden w-4 h-4" style="border-color:#d1d5db;border-top-color:#374151;"></div>
      </button>
    </div>
  </div>
</div>

<!-- ボトムナビ -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-20 bottom-nav-safe">
  <div class="flex items-center justify-around max-w-lg mx-auto" style="height:56px;">
    <button onclick="switchPage('home')" id="nav-home" class="flex flex-col items-center gap-0.5 px-5 py-2">

    <button onclick="switchPage('input')" id="nav-input" class="flex flex-col items-center gap-0.5 px-5 py-2">

    </button>

<!-- 修正モーダル -->
<div id="editModal" class="modal fixed inset-0 bg-black/40 z-50 items-end justify-center">
  <div class="bg-white w-full max-w-lg rounded-t-3xl p-5 shadow-2xl">

      <label class="block text-xs text-gray-400 mb-1">種別</label>

    </div>
    <div class="mb-4">
      <label class="block text-xs text-gray-400 mb-1">金額（円）</label>

<!-- マスタ編集モーダル -->
<div id="editMasterModal" class="modal fixed inset-0 bg-black/40 z-50 items-end justify-center">
  <div class="bg-white w-full max-w-lg rounded-t-3xl p-5 shadow-2xl">
    <div class="flex items-center justify-between mb-4">
      <span class="font-semibold text-gray-800">マスタ編集</span>
      <button id="closeEditMasterModal" class="text-gray-400 text-2xl leading-none">×</button>
    </div>
    <div class="mb-3">
      <label class="block text-xs text-gray-400 mb-1">種別名</label>
      <input id="editMasterType" type="text" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400">
    </div>
    <div class="mb-3">
      <label class="block text-xs text-gray-400 mb-1">金額（円）</label>
      <input id="editMasterAmount" type="number" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400">
    </div>
    <div class="mb-4">
      <label class="block text-xs text-gray-400 mb-1">説明（任意）</label>
      <input id="editMasterDesc" type="text" class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:outline-none focus:border-indigo-400">
    </div>
    <input type="hidden" id="editMasterRowIndex">
    <button id="confirmEditMasterBtn" class="w-full bg-indigo-600 text-white rounded-xl py-3 font-semibold text-sm mb-2">更新する</button>
  </div>
</div>

<!-- トースト -->
<div id="toast" class="toast fixed bottom-20 left-1/2 -translate-x-1/2 z-50 bg-gray-900 text-white text-sm px-5 py-2.5 rounded-full shadow-xl whitespace-nowrap">
  <span id="toastMsg"></span>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby3931P6ityh6mjGOiBVmLdRSR12lXss9TxYYAxd9XHBYKNJCPhSjBw1_b9cjh2e-_B/exec';
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/17bAyQngDEjoDgqSLLUU5p45HWXomF09bLf_h6FySsjs';

let masterItems = [];
let trendChartObj = null;
let monthChartObj = null;
let trendChart12Obj = null;
let trendData = [];
let trendLabels = [];
let currentPeriod = 7;
let currentStatsChart = 'month';

// ========== ユーティリティ ==========
const fmt = n => '¥' + Number(n).toLocaleString();
const escQ = s => String(s).replace(/'/g, "\\'");

function showToast(msg, isErr = false) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.className = `toast fixed bottom-20 left-1/2 -translate-x-1/2 z-50 text-white text-sm px-5 py-2.5 rounded-full shadow-xl whitespace-nowrap ${isErr ? 'bg-red-600' : 'bg-gray-900'}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function apiGet(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params);
  const r = await fetch(url); return r.json();
}
async function apiPost(body) {
  const r = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
  return r.json();
}

// ========== ページ切り替え ==========
const pages = ['home','input','stats','settings'];
function switchPage(page) {
  pages.forEach(p => {
    document.getElementById('page-' + p).classList.toggle('active', p === page);
    const nav = document.getElementById('nav-' + p);
    if (!nav) return;
    const label = nav.querySelector('span:last-child');
    label.className = p === page ? 'text-xs text-indigo-600 font-medium' : 'text-xs text-gray-400';
  });
  if (page === 'input') loadHistory();
  if (page === 'stats') loadStats();
  if (page === 'settings') loadMaster();
}

// ========== 日付 ==========
function updateDate() {
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('headerDate').textContent = `${now.getMonth()+1}月${now.getDate()}日 ${days[now.getDay()]}`;
}

// ========== マスタ ==========
async function loadMaster() {
  document.getElementById('masterSpinner').classList.remove('hidden');
  try {
    const d = await apiGet({ action: 'getMaster' });
    masterItems = d.items || [];
    renderMasterList();
    updateSelects();
    renderQuickBtns();
  } catch(e) { showToast('マスタ取得エラー', true); }
  finally { document.getElementById('masterSpinner').classList.add('hidden'); }
}

function renderMasterList() {
  const el = document.getElementById('masterList');
  if (!masterItems.length) { el.innerHTML = '<div class="py-4 text-center text-gray-400">マスタが空です</div>'; return; }
  el.innerHTML = masterItems.map(item => `
    <div class="flex items-center justify-between py-3 gap-2">
      <div>
        <span class="font-medium text-gray-800 text-sm">${item.type}</span>
        <span class="text-xs text-indigo-600 ml-2">${fmt(item.amount)}</span>
        ${item.description ? `<span class="text-xs text-gray-400 ml-1">${item.description}</span>` : ''}
      </div>
      <div class="flex gap-1 flex-shrink-0">
        <button onclick="openEditMaster(${item.rowIndex},'${escQ(item.type)}',${item.amount},'${escQ(item.description||'')}')" class="p-1.5 text-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg text-sm">✏️</button>

// ========== 今日の統計 ==========
async function loadTodayStats() {
  try {
    const d = await apiGet({ action: 'getTodayStats' });
    document.getElementById('kpi_today').textContent = fmt(d.totalSales);
    document.getElementById('kpi_today_count').textContent = `${d.totalCount}件`;
    document.getElementById('kpi_shinki').textContent = fmt(d.shinkiSales);
    document.getElementById('kpi_shinki_count').textContent = `${d.shinkiCount}件`;
    document.getElementById('kpi_joren').textContent = fmt(d.jorenSales);
    document.getElementById('kpi_joren_count').textContent = `${d.jorenCount}件`;
    document.getElementById('todayCountBadge').textContent = `${d.totalCount}件`;

    // 今月
    const now = new Date();
    const thisMonth = await apiGet({ action: 'getMonthStats', year: now.getFullYear(), month: now.getMonth()+1 });
    const prevMonth = await apiGet({ action: 'getMonthStats', year: now.getFullYear(), month: now.getMonth() || 12 });
    document.getElementById('kpi_month').textContent = fmt(thisMonth.totalSales);
    if (prevMonth.totalSales > 0) {
      const pct = Math.round((thisMonth.totalSales - prevMonth.totalSales) / prevMonth.totalSales * 100);
      const el = document.getElementById('kpi_month_diff');
      el.textContent = `${pct >= 0 ? '▲' : '▼'}${Math.abs(pct)}% 先月比`;
      el.className = `text-xs mt-0.5 ${pct >= 0 ? 'text-green-600' : 'text-red-500'}`;
    }

    // 今日履歴
    await loadTodayHistory();
    // グラフ
    await loadTrendData();
  } catch(e) {
    document.getElementById('kpi_today').textContent = 'エラー';
  }
}

async function loadTodayHistory() {
  try {
    const d = await apiGet({ action: 'getRecentHistory', days: 1 });
    const records = (d.records || []).slice(0, 5);
    const el = document.getElementById('todayHistoryList');
    if (!records.length) { el.innerHTML = '<div class="text-gray-400 py-3 text-center text-sm">まだ記録がありません</div>'; return; }
    el.innerHTML = records.map(r => `
      <div class="flex items-center justify-between py-2.5 gap-2">
        <span class="text-xs px-2 py-0.5 rounded-lg font-medium ${r.type === '新規' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${r.type}</span>
        <span class="font-semibold text-gray-800 text-sm flex-1 text-right">${fmt(r.amount)}</span>
        <span class="text-xs text-gray-400">${r.time}</span>
        <button onclick="deleteSale(${r.rowIndex},'今日')" class="text-xs text-red-400 hover:text-red-600 flex-shrink-0">取消</button>
      </div>
    `).join('');
  } catch(e) {}
}

// ========== トレンドグラフ ==========
async function loadTrendData() {
  document.getElementById('trendSpinner').style.display = 'flex';
  document.getElementById('trendChartWrap').style.display = 'none';
  try {
    const d = await apiGet({ action: 'getRecentHistory', days: 30 });
    const records = d.records || [];
    // 日別集計
    const dayMap = {};
    records.forEach(r => {
      const key = r.date;
      dayMap[key] = (dayMap[key] || 0) + r.amount;
    });
    // 過去30日分のラベル・データ
    trendLabels = [];
    trendData = [];
    for (let i = 29; i >= 0; i--) {
      const dt = new Date(); dt.setDate(dt.getDate() - i);
      const key = `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;
      const label = `${dt.getMonth()+1}/${dt.getDate()}`;
      trendLabels.push(label);
      trendData.push(dayMap[key] || 0);
    }
    renderTrendChart(currentPeriod);
  } catch(e) {}
  finally {
    document.getElementById('trendSpinner').style.display = 'none';
    document.getElementById('trendChartWrap').style.display = 'block';
  }
}

function renderTrendChart(period) {
  const labels = trendLabels.slice(-period);
  const data = trendData.slice(-period);
  const ctx = document.getElementById('trendChart').getContext('2d');
  if (trendChartObj) trendChartObj.destroy();
  trendChartObj = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.07)',
        fill: true,
        tension: 0.4,
        pointRadius: data.length <= 10 ? 4 : 2,
        pointBackgroundColor: '#6366f1',
        borderWidth: 2.5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => fmt(ctx.raw) } }
      },
      scales: {
        x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 10 }, color: '#9ca3af', maxTicksLimit: period <= 7 ? 7 : period <= 15 ? 8 : 10 } },
        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { font: { size: 10 }, color: '#9ca3af', callback: v => v === 0 ? '0' : (v/10000).toFixed(1) + '万' } }
      }
    }
  });
}

function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(btn => {
    const active = parseInt(btn.dataset.p) === period;
    btn.className = `period-btn px-3 py-1 rounded-lg text-xs ${active ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-500'}`;
  });
  if (trendData.length) renderTrendChart(period);
}

// ========== 履歴 ==========
async function loadHistory() {
  document.getElementById('historySpinner').classList.remove('hidden');
  try {
    const d = await apiGet({ action: 'getRecentHistory', days: 30 });
    const records = d.records || [];
    const el = document.getElementById('historyList');
    if (!records.length) { el.innerHTML = '<div class="text-center text-gray-400 py-4">履歴がありません</div>'; return; }
    // 日付グルーピング
    const groups = {};
    records.forEach(r => { if (!groups[r.date]) groups[r.date] = []; groups[r.date].push(r); });
    el.innerHTML = Object.entries(groups).map(([date, items]) => `
      <div class="mb-2">
        <div class="text-xs text-gray-400 font-medium py-1.5">${date}</div>
        <div class="divide-y divide-gray-50">
          ${items.map(r => `
            <div class="flex items-center justify-between py-2 gap-2">
              <span class="text-xs px-2 py-0.5 rounded-lg font-medium flex-shrink-0 ${r.type === '新規' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'}">${r.type}</span>
              <span class="font-semibold text-gray-800 text-sm flex-1">${fmt(r.amount)}</span>
              <span class="text-xs text-gray-400">${r.time}</span>
              <button onclick="openEditSale(${r.rowIndex},'${escQ(r.type)}',${r.amount})" class="text-indigo-400 hover:text-indigo-600 p-1 rounded text-sm">✏️</button>
              <button onclick="deleteSale(${r.rowIndex},'${date}')" class="text-red-400 hover:text-red-600 p-1 rounded text-sm">🗑</button>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  } catch(e) { document.getElementById('historyList').innerHTML = '<div class="text-red-400 text-center py-4">履歴取得エラー</div>'; }
  finally { document.getElementById('historySpinner').classList.add('hidden'); }
}

function initStatsSelects() {

  for (let m = 1; m <= 12; m++) mOpts += `<option value="${m}" ${m === now.getMonth()+1 ? 'selected' : ''}>${m}月</option>`;
  document.getElementById('statsYear').innerHTML = yOpts;
  document.getElementById('statsMonth').innerHTML = mOpts;
}

async function loadStats() {
  const year = Number(document.getElementById('statsYear').value);
  const month = Number(document.getElementById('statsMonth').value);
  document.getElementById('statsChartSpinner').style.display = 'flex';
  document.getElementById('monthChartWrap').style.display = 'none';
  document.getElementById('trendChartWrap12').style.display = 'none';
  try {

    document.getElementById('statsTotalSales').textContent = fmt(d.totalSales);
    document.getElementById('statsTotalCount').textContent = `${d.totalCount}件`;
    renderMonthChart(d);
    await loadTrend12();
    renderStatsTable(year, month, d);

  finally {
    document.getElementById('statsChartSpinner').style.display = 'none';
    switchStatsChart(currentStatsChart);

function renderMonthChart(d) {
  const ctx = document.getElementById('monthChart').getContext('2d');
  if (monthChartObj) monthChartObj.destroy();
  monthChartObj = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['新規','常連'],
      datasets: [{ data: [d.shinkiSales, d.jorenSales], backgroundColor: ['#6366f1','#22c55e'], borderRadius: 8 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.raw) } } },
      scales: { y: { ticks: { callback: v => '¥' + v.toLocaleString() } } }
    }
  });
}

async function loadTrend12() {
  const now = new Date();
  const labels = [], data = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    labels.push(`${d.getMonth()+1}月`);
    const res = await apiGet({ action: 'getMonthStats', year: d.getFullYear(), month: d.getMonth()+1 });
    data.push(res.totalSales);
  }
  const ctx = document.getElementById('trendChart12').getContext('2d');
  if (trendChart12Obj) trendChart12Obj.destroy();
  trendChart12Obj = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{ data, borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.07)', fill: true, tension: 0.4, pointRadius: 4, borderWidth: 2.5 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => fmt(c.raw) } } },
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => v === 0 ? '0' : (v/10000).toFixed(1) + '万' } }
      }
    }
  });
}

function switchStatsChart(type) {
