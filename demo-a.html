<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案A — あまと整体院 売上管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ボタンアニメーション */
    .quick-btn {
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }
    .quick-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .quick-btn:active {
      transform: scale(0.96);
      filter: brightness(0.92);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* メインカードのシマーアニメーション */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .main-card {
      background: linear-gradient(135deg, #4338ca 0%, #6366f1 50%, #818cf8 75%, #4338ca 100%);
      background-size: 200% 200%;
      animation: shimmer 6s linear infinite;
    }

    /* バッジのパルス */
    @keyframes badge-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }
    .badge-pulse { animation: badge-pulse 2.4s ease-in-out infinite; }

    /* ボトムナビのアイコン */
    .nav-item {
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .nav-item:active { transform: scale(0.88); }

    /* リストアイテムのフェードイン */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .list-item { animation: fadeInUp 0.3s ease both; }
    .list-item:nth-child(1) { animation-delay: 0.05s; }
    .list-item:nth-child(2) { animation-delay: 0.10s; }
    .list-item:nth-child(3) { animation-delay: 0.15s; }

    /* スクロール領域 */
    .scroll-area { overflow-y: auto; padding-bottom: 72px; }
    .scroll-area::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-100 flex justify-center min-h-screen">
  <div class="w-full max-w-sm bg-gray-50 min-h-screen relative flex flex-col shadow-xl">

    <!-- ① ヘッダー -->
    <header class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100 sticky top-0 z-10">
      <span class="text-lg font-bold text-gray-900 tracking-tight">あまと整体院</span>
      <span class="text-sm font-medium text-gray-500">4月17日 金</span>
    </header>

    <!-- スクロール領域 -->
    <div class="scroll-area flex-1">
      <div class="px-4 pt-4 space-y-4">

        <!-- ② メインカード -->
        <div class="main-card rounded-2xl p-5 shadow-lg">
          <p class="text-white text-xs font-medium opacity-80 mb-1">今日の売上</p>
          <p class="text-white font-bold leading-none mb-2" style="font-size:3rem;">¥8,770</p>
          <div class="flex items-center gap-3">
            <span class="text-white text-base font-medium">3件</span>
            <span class="badge-pulse inline-flex items-center bg-green-400 text-white text-xs font-bold px-3 py-0.5 rounded-full shadow">
              ▲12% 昨日比
            </span>
          </div>
        </div>

        <!-- ③ 新規/常連カード -->
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-green-50 rounded-2xl p-4 border border-green-100">
            <p class="text-green-700 font-bold text-sm mb-1">🆕 新規</p>
            <p class="text-green-700 text-2xl font-bold leading-tight">2件</p>
            <p class="text-green-700 text-sm font-semibold mt-1">¥6,540</p>
          </div>
          <div class="bg-blue-50 rounded-2xl p-4 border border-blue-100">
            <p class="text-blue-700 font-bold text-sm mb-1">👥 常連</p>
            <p class="text-blue-700 text-2xl font-bold leading-tight">1件</p>
            <p class="text-blue-700 text-sm font-semibold mt-1">¥5,500</p>
          </div>
        </div>

        <!-- ④ クイック入力 -->
        <div>
          <p class="text-gray-500 text-xs font-medium mb-2">⚡ タップして記録</p>
          <div class="space-y-3">
            <button class="quick-btn w-full h-14 bg-green-500 text-white font-bold text-base rounded-2xl shadow flex items-center justify-center gap-2">
              🆕 新規　¥3,270
            </button>
            <button class="quick-btn w-full h-14 bg-blue-500 text-white font-bold text-base rounded-2xl shadow flex items-center justify-center gap-2">
              👥 常連　¥5,500
            </button>
          </div>
        </div>

        <!-- ⑤ 今日の記録 -->
        <div class="bg-white rounded-2xl p-4 border border-gray-100 shadow-sm">
          <div class="flex items-center justify-between mb-3">
            <p class="text-sm font-bold text-gray-800">今日の記録</p>
            <a href="#" class="text-xs text-indigo-600 font-medium">すべて見る →</a>
          </div>
          <ul class="space-y-2">
            <li class="list-item flex items-center justify-between py-2 border-b border-gray-50">
              <div class="flex items-center gap-2">
                <span class="inline-block bg-green-100 text-green-700 text-xs font-bold px-2 py-0.5 rounded-full">新規</span>
                <span class="text-sm font-semibold text-gray-800">¥3,270</span>
              </div>
              <span class="text-xs text-gray-400">10:30</span>
            </li>
            <li class="list-item flex items-center justify-between py-2 border-b border-gray-50">
              <div class="flex items-center gap-2">
                <span class="inline-block bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full">常連</span>
                <span class="text-sm font-semibold text-gray-800">¥5,500</span>
              </div>
              <span class="text-xs text-gray-400">12:00</span>
            </li>
            <li class="list-item flex items-center justify-between py-2">
              <div class="flex items-center gap-2">
                <span class="inline-block bg-green-100 text-green-700 text-xs font-bold px-2 py-0.5 rounded-full">新規</span>
                <span class="text-sm font-semibold text-gray-800">¥3,270</span>
              </div>
              <span class="text-xs text-gray-400">14:15</span>
            </li>
          </ul>
        </div>

      </div><!-- /px-4 -->
    </div><!-- /scroll-area -->

    <!-- ⑥ ボトムナビ -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-white border-t border-gray-200 flex items-center justify-around py-2 z-20 shadow-lg">
      <button class="nav-item flex flex-col items-center gap-0.5 text-indigo-600">
        <span class="text-xl">🏠</span>
        <span class="text-[10px] font-semibold">ホーム</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-0.5 text-gray-400">
        <span class="text-xl">➕</span>
        <span class="text-[10px] font-medium">入力</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-0.5 text-gray-400">
        <span class="text-xl">📊</span>
        <span class="text-[10px] font-medium">集計</span>
      </button>
      <button class="nav-item flex flex-col items-center gap-0.5 text-gray-400">
        <span class="text-xl">⚙️</span>
        <span class="text-[10px] font-medium">設定</span>
      </button>
    </nav>

  </div>
</body>
</html>
