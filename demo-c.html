<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>案C — あまと整体院 売上管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* POS ボタンのリップル＋プレスアニメーション */
    .pos-btn {
      position: relative;
      overflow: hidden;
      transition: transform 0.1s ease, filter 0.1s ease, box-shadow 0.1s ease;
      cursor: pointer;
      user-select: none;
    }
    .pos-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
    }
    .pos-btn:active {
      transform: scale(0.94);
      filter: brightness(0.88);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* リップルエフェクト */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: ripple-anim 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* 取消ボタン */
    .cancel-btn {
      transition: background 0.12s ease, transform 0.1s ease;
    }
    .cancel-btn:hover { background: #ef4444; color: white; }
    .cancel-btn:active { transform: scale(0.88); }

    /* 売上バナーの数字スケールイン */
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    .sale-amount { animation: scaleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }

    /* 記録リストのフェード */
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .record-row { animation: fadeInLeft 0.3s ease both; }
    .record-row:nth-child(1) { animation-delay: 0.15s; }
    .record-row:nth-child(2) { animation-delay: 0.25s; }
    .record-row:nth-child(3) { animation-delay: 0.35s; }

    /* ボタンの登場アニメ */
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .pop-in { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
    .pop-in:nth-child(1) { animation-delay: 0.1s; }
    .pop-in:nth-child(2) { animation-delay: 0.2s; }

    /* スクロール */
    .scroll-area { overflow-y: auto; padding-bottom: 80px; }
    .scroll-area::-webkit-scrollbar { display: none; }

    body { background: #0f172a; }
  </style>
</head>
<body class="flex justify-center min-h-screen">
  <div class="w-full max-w-sm bg-slate-900 min-h-screen relative flex flex-col">

    <!-- ① ヘッダー -->
    <header class="bg-slate-900 px-4 py-3 flex items-center justify-between border-b border-slate-700 sticky top-0 z-10">
      <div class="w-16"></div>
      <h1 class="text-white font-extrabold text-lg tracking-widest text-center">あまと整体院</h1>
      <span class="text-slate-400 text-xs font-medium text-right w-16">4/17 金</span>
    </header>

    <!-- スクロール領域 -->
    <div class="scroll-area flex-1">

      <!-- ② 売上バナー -->
      <div class="bg-slate-800 px-4 py-6 text-center border-b border-slate-700">
        <p class="sale-amount text-white font-extrabold leading-none tracking-tight" style="font-size:3.5rem;">¥8,770</p>
        <p class="text-slate-400 text-sm font-medium mt-2">本日売上　3件</p>
      </div>

      <div class="px-4 pt-5 space-y-5">

        <!-- ③ POSボタングリッド -->
        <div class="grid grid-cols-2 gap-4">
          <button class="pos-btn pop-in bg-green-500 text-white rounded-3xl shadow-xl flex flex-col items-center justify-center" style="height:8rem;" onclick="addRipple(event, this)">
            <span class="text-3xl mb-1">🆕</span>
            <span class="text-xl font-extrabold tracking-wide">新規</span>
            <span class="text-sm font-semibold opacity-80 mt-0.5">¥3,270</span>
          </button>
          <button class="pos-btn pop-in bg-blue-500 text-white rounded-3xl shadow-xl flex flex-col items-center justify-center" style="height:8rem;" onclick="addRipple(event, this)">
            <span class="text-3xl mb-1">👥</span>
            <span class="text-xl font-extrabold tracking-wide">常連</span>
            <span class="text-sm font-semibold opacity-80 mt-0.5">¥5,500</span>
          </button>
        </div>

        <!-- ④ 直近の記録 -->
        <div>
          <p class="text-slate-400 text-xs font-semibold mb-2 tracking-widest uppercase">直近の記録</p>
          <div class="bg-slate-800 rounded-2xl overflow-hidden border border-slate-700">
            <div class="record-row flex items-center justify-between px-4 py-3 border-b border-slate-700">
              <div class="flex items-center gap-3">
                <span class="inline-block bg-green-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">新規</span>
                <span class="text-white font-bold text-sm">¥3,270</span>
                <span class="text-slate-400 text-xs">10:30</span>
              </div>
              <button class="cancel-btn text-red-400 border border-red-400 text-xs font-bold px-2 py-0.5 rounded-lg">取消</button>
            </div>
            <div class="record-row flex items-center justify-between px-4 py-3 border-b border-slate-700">
              <div class="flex items-center gap-3">
                <span class="inline-block bg-blue-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">常連</span>
                <span class="text-white font-bold text-sm">¥5,500</span>
                <span class="text-slate-400 text-xs">12:00</span>
              </div>
              <button class="cancel-btn text-red-400 border border-red-400 text-xs font-bold px-2 py-0.5 rounded-lg">取消</button>
            </div>
            <div class="record-row flex items-center justify-between px-4 py-3">
              <div class="flex items-center gap-3">
                <span class="inline-block bg-green-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">新規</span>
                <span class="text-white font-bold text-sm">¥3,270</span>
                <span class="text-slate-400 text-xs">14:15</span>
              </div>
              <button class="cancel-btn text-red-400 border border-red-400 text-xs font-bold px-2 py-0.5 rounded-lg">取消</button>
            </div>
          </div>
        </div>

      </div>
    </div><!-- /scroll-area -->

    <!-- ⑤ 本日集計バー（固定） -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-slate-900 border-t border-slate-700 px-4 py-3 z-20">
      <p class="text-center text-slate-300 text-xs font-semibold leading-relaxed">
        <span class="text-green-400">新規 2件 ¥6,540</span>
        <span class="text-slate-600 mx-2">|</span>
        <span class="text-blue-400">常連 1件 ¥5,500</span>
        <span class="text-slate-600 mx-2">|</span>
        <span class="text-white font-bold">合計 3件 ¥12,040</span>
      </p>
    </div>

  </div>

  <script>
    function addRipple(e, btn) {
      const circle = document.createElement('span');
      const diameter = Math.max(btn.clientWidth, btn.clientHeight);
      const radius = diameter / 2;
      const rect = btn.getBoundingClientRect();
      circle.style.width = circle.style.height = diameter + 'px';
      circle.style.left = (e.clientX - rect.left - radius) + 'px';
      circle.style.top  = (e.clientY - rect.top  - radius) + 'px';
      circle.classList.add('ripple');
      const existing = btn.querySelector('.ripple');
      if (existing) existing.remove();
      btn.appendChild(circle);
    }
  </script>
</body>
</html>
